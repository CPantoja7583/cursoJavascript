<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Pokédex</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      background-color: #f5f5f5;
      color: #222;
    }

    header {
      max-width: 1000px;
      margin: 0 auto 24px;
    }

    h1 { margin: 0 0 4px; color: #cc0000; font-size: 28px; }
    .subtitulo { font-size: 13px; color: #666; font-style: italic; margin: 0 0 16px; }

    /* ── Controles ─────────────────────────────────────────── */
    .controles {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      margin-bottom: 20px;
    }

    .controles input[type="text"] {
      padding: 8px 12px;
      border: 1px solid #ccc;
      border-radius: 5px;
      font-size: 14px;
      width: 220px;
    }

    .controles select {
      padding: 8px 10px;
      border: 1px solid #ccc;
      border-radius: 5px;
      font-size: 14px;
    }

    button {
      padding: 8px 16px;
      font-size: 14px;
      cursor: pointer;
      background-color: #cc0000;
      color: white;
      border: none;
      border-radius: 5px;
    }
    button:hover { background-color: #aa0000; }
    button:disabled { background-color: #ccc; cursor: default; }

    .btn-secundario { background-color: #4a90d9; }
    .btn-secundario:hover { background-color: #357abd; }

    /* ── Grid de tarjetas ──────────────────────────────────── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 16px;
      max-width: 1000px;
      margin: 0 auto;
    }

    .card {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 14px 12px;
      text-align: center;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .card:hover { transform: translateY(-4px); box-shadow: 0 6px 16px rgba(0,0,0,0.12); }

    .card img { width: 96px; height: 96px; }
    .card .nombre {
      font-weight: bold;
      font-size: 14px;
      text-transform: capitalize;
      margin: 6px 0 4px;
    }
    .card .id { font-size: 12px; color: #888; margin-bottom: 8px; }

    /* ── Tipos (badges) ────────────────────────────────────── */
    .tipos { display: flex; justify-content: center; flex-wrap: wrap; gap: 4px; }
    .tipo {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 10px;
      color: #fff;
      text-transform: capitalize;
      font-weight: bold;
    }

    /* ── Panel de detalle ──────────────────────────────────── */
    .detalle-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .detalle-overlay.visible { display: flex; }

    .detalle-panel {
      background: #fff;
      border-radius: 12px;
      padding: 28px;
      max-width: 480px;
      width: 90%;
      position: relative;
    }

    .detalle-panel .cerrar {
      position: absolute;
      top: 12px;
      right: 16px;
      background: none;
      border: none;
      font-size: 22px;
      cursor: pointer;
      color: #666;
      padding: 0;
    }

    .detalle-header { display: flex; align-items: center; gap: 16px; margin-bottom: 16px; }
    .detalle-header img { width: 110px; height: 110px; }
    .detalle-header h2 { margin: 0 0 4px; text-transform: capitalize; font-size: 22px; }
    .detalle-header .id { color: #888; font-size: 13px; }

    .stats { margin-top: 16px; }
    .stats h3 { font-size: 15px; margin: 0 0 10px; border-bottom: 1px solid #eee; padding-bottom: 5px; }
    .stat-fila {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
      font-size: 13px;
    }
    .stat-nombre { width: 110px; color: #555; text-transform: capitalize; }
    .stat-valor { width: 32px; text-align: right; font-weight: bold; }
    .stat-barra-bg { flex: 1; height: 8px; background: #eee; border-radius: 4px; overflow: hidden; }
    .stat-barra { height: 100%; border-radius: 4px; background: #4a90d9; transition: width 0.4s; }

    /* ── Estados ───────────────────────────────────────────── */
    .estado {
      max-width: 1000px;
      margin: 20px auto;
      padding: 14px 18px;
      border-radius: 6px;
      font-size: 14px;
    }
    .estado.cargando { background: #fff3cd; color: #856404; border: 1px solid #ffeeba; }
    .estado.error    { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    .estado.cache    { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }

    .pie {
      max-width: 1000px;
      margin: 24px auto 0;
      display: flex;
      gap: 12px;
      align-items: center;
    }
    .pie .info { font-size: 13px; color: #666; }
  </style>
</head>
<body>

  <header>
    <h1>Pokédex</h1>
    <p class="subtitulo">Datos desde <code>https://pokeapi.co/api/v2/pokemon</code> — caché local activo</p>
  </header>

  <div class="controles" style="max-width:1000px; margin: 0 auto 20px;">
    <input type="text" id="buscador" placeholder="Buscar por nombre o #ID..." onkeydown="if(event.key==='Enter') pokedex.buscar()">
    <button onclick="pokedex.buscar()">Buscar</button>
    <select id="filtro-tipo" onchange="pokedex.filtrarPorTipo()">
      <option value="">Todos los tipos</option>
    </select>
    <button class="btn-secundario" onclick="pokedex.reiniciar()">Reiniciar</button>
  </div>

  <div id="estado" class="estado cargando" style="display:none"></div>
  <div id="grid" class="grid"></div>
  <div class="pie" id="pie" style="display:none">
    <button class="btn-secundario" onclick="pokedex.cargarMas()">Cargar más</button>
    <span class="info" id="info-total"></span>
  </div>

  <!-- Panel de detalle -->
  <div class="detalle-overlay" id="overlay" onclick="pokedex.cerrarDetalle(event)">
    <div class="detalle-panel" id="panel-detalle">
      <button class="cerrar" onclick="pokedex.cerrarDetalle()">✕</button>
      <div id="contenido-detalle"></div>
    </div>
  </div>

  <script src="pokedex.js"></script>
</body>
</html>
