<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Tarea 11 - Studio Ghibli API</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 850px;
      margin: 40px auto;
      padding: 0 20px;
      background-color: #f5f5f5;
    }
    h1 { color: #222; }
    h2 { color: #444; margin-top: 0; border-bottom: 1px solid #ccc; padding-bottom: 5px; }

    .grupo {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 24px;
    }

    button {
      padding: 10px 18px;
      font-size: 14px;
      cursor: pointer;
      background-color: #4a90d9;
      color: white;
      border: none;
      border-radius: 5px;
      text-align: left;
    }
    button:hover { background-color: #357abd; }

    #resultado {
      margin-top: 20px;
      padding: 16px 20px;
      border-radius: 6px;
      font-size: 14px;
      min-height: 24px;
      background-color: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
      display: none;
    }
    #resultado.error {
      background-color: #f8d7da;
      color: #721c24;
      border-color: #f5c6cb;
    }
    #resultado.warn {
      background-color: #fff3cd;
      color: #856404;
      border-color: #ffeeba;
    }

    #resultado table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    #resultado th {
      background-color: #155724;
      color: #fff;
      padding: 8px 10px;
      text-align: left;
    }
    #resultado td {
      padding: 7px 10px;
      border-bottom: 1px solid #c3e6cb;
      vertical-align: top;
    }
    #resultado tr:nth-child(even) td { background-color: rgba(0,0,0,0.03); }

    .nota {
      font-size: 13px;
      color: #666;
      font-style: italic;
      margin-bottom: 20px;
    }
    .badge-cache {
      display: inline-block;
      background-color: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
      border-radius: 4px;
      padding: 2px 8px;
      font-size: 12px;
      margin-left: 8px;
    }
  </style>
</head>
<body>

  <h1>Tarea 11 — Studio Ghibli API</h1>
  <p class="nota">
    Datos desde <code>https://ghibliapi.fly.dev/films</code> —
    caché local activo desde la segunda consulta.
  </p>

  <div class="grupo">
    <button onclick="api.listarTitulosYDirectores()">1. Títulos y Directores</button>
    <button onclick="api.listarTitulosYAnio()">2. Títulos y Año</button>
    <button onclick="api.filtrarPorAnio()">3. Filtrar por Año</button>
    <button onclick="api.listarTitulosYDescripcion()">4. Títulos y Descripción</button>
    <button onclick="api.listarIds()">5. Listar IDs</button>
  </div>

  <div id="resultado"></div>

  <script src="tarea11.js"></script>
</body>
</html>
