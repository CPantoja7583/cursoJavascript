<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Tarea 10 - Rick and Morty API</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 850px;
      margin: 40px auto;
      padding: 0 20px;
      background-color: #f5f5f5;
    }
    h1 { color: #222; }
    h2 { color: #444; margin-top: 30px; border-bottom: 1px solid #ccc; padding-bottom: 5px; }

    .grupo {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 20px;
    }

    button {
      padding: 10px 18px;
      font-size: 14px;
      cursor: pointer;
      background-color: #4a90d9;
      color: white;
      border: none;
      border-radius: 5px;
    }
    button:hover { background-color: #357abd; }

    #resultado {
      margin-top: 20px;
    }

    /* Lista de personajes */
    .lista-personajes {
      list-style: none;
      padding: 0;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }
    .lista-personajes li {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 10px 14px;
      font-size: 14px;
      width: 220px;
    }

    /* Agrupación por especie */
    .especie-grupo {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 12px 16px;
      margin-bottom: 12px;
    }
    .especie-grupo h3 {
      margin: 0 0 8px 0;
      color: #333;
      font-size: 15px;
    }
    .especie-grupo ul {
      margin: 0;
      padding-left: 18px;
      font-size: 14px;
    }
    .especie-grupo ul li { margin: 3px 0; }

    /* Ficha individual */
    .ficha {
      display: flex;
      gap: 20px;
      align-items: flex-start;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 16px;
      max-width: 360px;
    }
    .ficha img {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid #4a90d9;
    }
    .ficha-info p { margin: 4px 0; font-size: 14px; }
    .ficha-info strong { color: #333; }

    .nota {
      font-size: 13px;
      color: #666;
      font-style: italic;
      margin-top: 6px;
    }

    .badge-cache {
      display: inline-block;
      background-color: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
      border-radius: 4px;
      padding: 2px 8px;
      font-size: 12px;
      margin-left: 8px;
    }
  </style>
</head>
<body>

  <h1>Tarea 10 - Consumo de API REST</h1>
  <p>Datos obtenidos desde: <code>https://rickandmortyapi.com/api/character/1..10</code></p>
  <p class="nota">A partir de la segunda consulta los datos se leen desde memoria local (sin nueva llamada a la API).</p>

  <div class="grupo">
    <button onclick="app.listarPersonajes()">1. Lista de personajes</button>
    <button onclick="app.agruparPorEspecie()">2. Agrupar por especie</button>
    <button onclick="app.fichaPersonaje(1)">3. Ficha de Rick Sanchez</button>
  </div>

  <div id="resultado"></div>

  <script src="tarea10.js"></script>
</body>
</html>
