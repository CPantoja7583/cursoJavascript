<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Funciones Callback en JavaScript</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 700px;
            margin: 40px auto;
            padding: 0 20px;
            background-color: #f5f5f5;
        }
        h1 {
            color: #333;
        }
        h2 {
            color: #555;
            margin-top: 30px;
        }
        button {
            display: block;
            margin: 10px 0;
            padding: 10px 20px;
            font-size: 15px;
            cursor: pointer;
            background-color: #4a90d9;
            color: white;
            border: none;
            border-radius: 5px;
        }
        button:hover {
            background-color: #357abd;
        }
        .resultado {
            margin-top: 12px;
            padding: 12px 16px;
            border-radius: 5px;
            font-size: 15px;
            min-height: 20px;
        }
        .ok  { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .err { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .info{ background-color: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
        .warn{ background-color: #fff3cd; color: #856404; border: 1px solid #ffeeba; }
    </style>
</head>
<body>
    <h1>Funciones Callback en JavaScript</h1>

    <!-- ── Función 1 ── -->
    <h2>1. Validar número</h2>
    <button onclick="ejecutarValidacion()">Ingresar número</button>
    <div id="res1" class="resultado"></div>

    <!-- ── Función 2 ── -->
    <h2>2. Calcular sumatoria de impares (aviso después de 5 s)</h2>
    <button onclick="ejecutarSumatoriaImpares()">Calcular e ingresar número</button>
    <div id="res2" class="resultado"></div>

    <!-- ── Función 3 ── -->
    <h2>3. Sumatorias sucesivas</h2>
    <button onclick="ejecutarSumatoriasSucesivas()">Calcular e ingresar número</button>
    <div id="res3" class="resultado"></div>

    <script src="funciones_callback.js"></script>
    <script>
        // ── Función 1 ──────────────────────────────────────────
        function ejecutarValidacion() {
            const div = document.getElementById("res1");
            div.textContent = "";

            validar_numero(function(esValido, mensaje) {
                console.log(mensaje);
                div.textContent = mensaje;
                div.className = "resultado " + (esValido ? "ok" : "err");
            });
        }

        // ── Función 2 ──────────────────────────────────────────
        function ejecutarSumatoriaImpares() {
            const div = document.getElementById("res2");
            let numero = prompt("Ingrese un número para calcular la sumatoria de impares:");

            if (numero === null || numero.trim() === "" || isNaN(numero)) {
                div.textContent = "Número inválido o cancelado.";
                div.className = "resultado err";
                return;
            }

            numero = Number(numero);
            div.textContent = "Calculando... el resultado aparecerá en 5 segundos.";
            div.className = "resultado info";

            calcular_y_avisar_despues(numero, function(resultado) {
                const mensaje = "El valor de la sumatoria es " + resultado +
                                ". Este resultado se obtuvo hace 5 segundos.";
                console.log(mensaje);
                div.textContent = mensaje;
                div.className = "resultado ok";
            });
        }

        // ── Función 3 ──────────────────────────────────────────
        function ejecutarSumatoriasSucesivas() {
            const div = document.getElementById("res3");
            let numero = prompt("Ingrese un número para calcular las sumatorias sucesivas:");

            if (numero === null || numero.trim() === "" || isNaN(numero)) {
                div.textContent = "Número inválido o cancelado.";
                div.className = "resultado err";
                return;
            }

            numero = Number(numero);

            calcular_y_avisar_dependiendo(
                numero,
                function(n, resultado) {
                    const mensaje = "Las sumatorias sucesivas de " + n + " es " + resultado + ".";
                    console.log(mensaje);
                    div.textContent = mensaje;
                    div.className = "resultado ok";
                },
                function(n, resultado) {
                    const mensaje = "El número " + n + " sobrepasa el objetivo de la función. " +
                                    "El resultado obtenido fue " + resultado +
                                    ", que es mayor o igual a 1000.";
                    console.log(mensaje);
                    div.textContent = mensaje;
                    div.className = "resultado warn";
                }
            );
        }
    </script>
</body>
</html>
