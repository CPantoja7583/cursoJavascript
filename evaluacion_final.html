<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Evaluación Final Módulo 4</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 750px;
            margin: 40px auto;
            padding: 0 20px;
            background-color: #f5f5f5;
        }
        h1 { color: #222; }
        h2 { color: #444; margin-top: 30px; border-bottom: 1px solid #ccc; padding-bottom: 5px; }
        .grupo {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 12px;
        }
        button {
            padding: 10px 18px;
            font-size: 14px;
            cursor: pointer;
            background-color: #4a90d9;
            color: white;
            border: none;
            border-radius: 5px;
            text-align: left;
        }
        button:hover { background-color: #357abd; }
        #resultado {
            margin-top: 24px;
            padding: 14px 18px;
            border-radius: 6px;
            font-size: 14px;
            min-height: 24px;
        }
        #resultado ol, #resultado ul { margin: 8px 0; padding-left: 22px; }
        #resultado li { margin: 4px 0; }
        .ok   { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .err  { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .warn { background-color: #fff3cd; color: #856404; border: 1px solid #ffeeba; }
        .nota {
            font-size: 13px;
            color: #666;
            margin-top: 6px;
            font-style: italic;
        }
    </style>
</head>
<body>

    <h1>Evaluación Final Módulo 4</h1>
    <p>Datos obtenidos desde: <code>https://jsonplaceholder.typicode.com/users</code></p>
    <p class="nota">Los resultados también se muestran en la consola del navegador (F12).</p>

    <h2>Métodos disponibles</h2>
    <div class="grupo">

        <button onclick="admin.listarNombres()">
            1. Listar nombres de todos los usuarios
        </button>

        <button onclick="admin.mostrarInfoBasica()">
            2. Información básica de un usuario (username y correo)
        </button>

        <button onclick="admin.mostrarDireccion()">
            3. Dirección de un usuario (todos los campos)
        </button>

        <button onclick="admin.mostrarInfoAvanzada()">
            4. Información avanzada de un usuario (teléfono, web y compañía)
        </button>

        <button onclick="admin.listarCompanias()">
            5. Listar todas las compañías con su frase clave
        </button>

        <button onclick="admin.listarNombresOrdenados()">
            6. Listar nombres ordenados alfabéticamente
        </button>

    </div>

    <div id="resultado" class="resultado ok">
        Cargando datos del servidor...
    </div>

    <script src="evaluacion_final.js"></script>
</body>
</html>
